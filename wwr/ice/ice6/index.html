<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="stuff">
        <section class="sign_up">
            <div class="top">
                <h1>Sign Up</h1>
            </div>
            <div class="mid">
                <p>Please sign up with your real name.</p>
                <p>Once you enter it, you will not be able to change it later.</p>
                <p><b>A password will be sent to your email, so please make sure it is correct</b></p>
            </div>
            <div class="bot">
                <form>
                    <input  class="textinput" type="text" id="name" placeholder="Enter your name"><br>
                    <input class="textinput" type="text" id="email" placeholder="Enter your email"><br>
                </form>
                <button id="sign">Sign Up</button>
            </div>
        </section>
        <section class="london">
            <img src="images/london.jpg" alt="london">
        </section>
    </section>
</body>
</html>
