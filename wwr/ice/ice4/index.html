<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Challenge W07</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="stuff">
        <section class="glasses">
            <img src="images/branding-glasses.jpg" alt="">
        </section>
        <section class="all-words">
            <button class="button">X</button>
            <h1>How consistent is your branding?</h1>
            <h4 id="description">Download our brand touchpoints checklist to see all the places that your brand needs to shine!</h4>
            <form>
                <input class="textinput" type="text" id="email" placeholder="Email"><br>
                <input  class="textinput" type="text" id="name" placeholder="Name"><br>
            </form>
            <input type="checkbox" id="news" name="news">
            <label for="news">Opt in to receive news and updates</label>
            <h2 class="sub">SUBSCRIBE</h2>
        </section>
    </section>
</body>
</html>
